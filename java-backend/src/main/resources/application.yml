server:
  port: ${SERVER_PORT:${API_PRIVATE_ROUTER_SERVER_PORT:8080}}
  address: ${SERVER_HOST:${API_PRIVATE_ROUTER_SERVER_HOST:0.0.0.0}}

spring:
  config:
    import:
      - optional:file:${DATA_DIR:${API_PRIVATE_ROUTER_DATA_DIR:./data}}/config.yaml
      - optional:file:./config.yaml
      - optional:file:../config.yaml
      - optional:file:../data/config.yaml
  application:
    name: api-private-router-java-backend
  datasource:
    url: ${API_PRIVATE_ROUTER_DB_URL:${DATABASE_URL:jdbc:postgresql://${DATABASE_HOST:${database.host:127.0.0.1}}:${DATABASE_PORT:${database.port:5432}}/${DATABASE_DBNAME:${database.dbname:api_private_router}}?sslmode=${DATABASE_SSLMODE:${database.sslmode:disable}}}}
    username: ${API_PRIVATE_ROUTER_DB_USERNAME:${DATABASE_USER:${database.user:api_private_router}}}
    password: ${API_PRIVATE_ROUTER_DB_PASSWORD:${DATABASE_PASSWORD:${database.password:api_private_router}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
      minimum-idle: 0

api-private-router:
  data:
    dir: ${API_PRIVATE_ROUTER_DATA_DIR:${DATA_DIR:./data}}
  frontend:
    dist-dir: ${API_PRIVATE_ROUTER_FRONTEND_DIST_DIR:}
  jwt:
    secret: ${API_PRIVATE_ROUTER_JWT_SECRET:${JWT_SECRET:${jwt.secret:}}}
    access-token-expire-minutes: ${API_PRIVATE_ROUTER_JWT_ACCESS_TOKEN_EXPIRE_MINUTES:0}
    expire-hour: ${API_PRIVATE_ROUTER_JWT_EXPIRE_HOUR:${JWT_EXPIRE_HOUR:${jwt.expire_hour:24}}}
    refresh-token-expire-days: ${API_PRIVATE_ROUTER_JWT_REFRESH_TOKEN_EXPIRE_DAYS:30}
  auto-setup:
    enabled: ${API_PRIVATE_ROUTER_AUTO_SETUP_ENABLED:${AUTO_SETUP:false}}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    org.springframework.web.servlet.DispatcherServlet: INFO
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: WARN
    org.springframework.jdbc.core: DEBUG
    org.springframework.jdbc.support: DEBUG
    org.springframework.web: INFO
